<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse Content Engine v28 — 灵枢</title>
<style>
:root{--ac:#6366F1;--ac2:#7C3AED;--b:#E5E7EB;--bh:#D1D5DB;--t:#1E293B;--t2:#64748B;--t3:#94A3B8;--bg:linear-gradient(135deg,#FAFBFC,#F0F4FF);--r:10px;--sh:0 2px 8px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Inter','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t);overflow:hidden;height:100vh;font-size:13px}
.top{background:rgba(255,255,255,.75);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);padding:10px 24px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:10}
.top b{font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top .actions{display:flex;gap:6px;align-items:center}
.btn-ghost{padding:6px 12px;border:1px solid transparent;border-radius:8px;font-size:11px;color:var(--t2);cursor:pointer;background:transparent;transition:all .15s;font-family:inherit}
.btn-ghost:hover{background:rgba(99,102,241,.04);color:var(--ac)}
.btn-ghost.ac{border-color:rgba(99,102,241,.2);color:var(--ac)}
.main{display:flex;height:calc(100vh - 45px)}
.panel{overflow-y:auto;padding:16px}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:var(--bh);border-radius:2px}

#left{width:230px;flex-shrink:0;padding-right:8px}
#center{flex:1;display:flex;flex-direction:column}
#right{width:220px;flex-shrink:0;display:none;padding-left:8px}

/* Frosted glass section */
.sec{margin-bottom:14px}
.sec h3{font-size:10px;color:var(--t3);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.8px}

/* Category grid - gradient selected */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.cg .ci{padding:8px 6px;background:rgba(255,255,255,.6);border:1px solid var(--b);border-radius:10px;font-size:11px;color:var(--t2);cursor:pointer;text-align:center;transition:all .2s;user-select:none;position:relative;backdrop-filter:blur(4px)}
.cg .ci:hover{border-color:var(--ac);transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,.1)}
.cg .ci.on{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(99,102,241,.35);font-weight:600}

/* Platform grid */
.pg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.pg .pi{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;background:rgba(255,255,255,.6);border:1px solid var(--b);border-radius:10px;font-size:9px;color:var(--t2);cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.pg .pi:hover{border-color:var(--ac);box-shadow:0 4px 12px rgba(99,102,241,.1)}
.pg .pi.on{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(124,58,237,.06));border-color:var(--ac);color:var(--ac);font-weight:600;box-shadow:0 2px 12px rgba(99,102,241,.15)}
.pg .pi .ico{font-size:16px}

/* Settings rows */
.sr{display:flex;gap:6px;align-items:center;margin-top:5px}
.sr label{font-size:9px;color:var(--t3);min-width:28px}
.sr select,.sr input{flex:1;padding:5px 8px;background:rgba(255,255,255,.7);border:1px solid var(--b);border-radius:8px;font-size:10px;color:var(--t);outline:none;font-family:inherit;backdrop-filter:blur(4px);transition:all .15s}
.sr select:focus,.sr input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(99,102,241,.1)}

/* Center workspace */
.workspace{flex:1;display:flex;flex-direction:column;gap:10px;padding:0 24px}
.chips-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 14px;background:rgba(255,255,255,.8);border:1px solid var(--b);border-radius:20px;font-size:11px;color:var(--t2);cursor:pointer;transition:all .18s;backdrop-filter:blur(4px);box-shadow:0 1px 3px rgba(0,0,0,.03)}
.chip:hover{border-color:var(--ac);color:var(--ac);box-shadow:0 2px 8px rgba(99,102,241,.1)}

.editor{flex:1;display:flex;flex-direction:column;gap:10px}
.editor .tl{width:100%;padding:8px 0;background:transparent;border:none;border-bottom:2px solid var(--b);font-size:20px;color:var(--t);font-weight:700;outline:none;font-family:inherit}
.editor .tl::placeholder{color:var(--t3);font-weight:400}
.editor .tl:focus{border-bottom-color:var(--ac)}
.editor .body{flex:1;width:100%;padding:16px;background:rgba(255,255,255,.8);border:1px solid var(--b);border-radius:12px;font-size:14px;color:var(--t);outline:none;resize:none;font-family:inherit;line-height:1.8;overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,.03);backdrop-filter:blur(4px);transition:all .2s}
.editor .body:focus{border-color:var(--ac);box-shadow:0 0 0 4px rgba(99,102,241,.08),0 4px 16px rgba(99,102,241,.1)}
.editor .body::placeholder{color:var(--t3)}

.bar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0}
.bar .meta{font-size:10px;color:var(--t3);display:flex;gap:8px;align-items:center}
.btn-gen{padding:10px 28px;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,.3);transition:all .2s;font-family:inherit}
.btn-gen:hover{box-shadow:0 6px 24px rgba(99,102,241,.4);transform:translateY(-1px)}
.btn-gen:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:0 2px 8px rgba(99,102,241,.15)}
.btn-gen.stop{background:linear-gradient(135deg,#EF4444,#DC2626);box-shadow:0 4px 16px rgba(239,68,68,.3)}
.btn-sm{padding:5px 12px;background:rgba(255,255,255,.8);border:1px solid var(--b);border-radius:8px;font-size:10px;color:var(--t2);cursor:pointer;transition:all .15s;font-family:inherit;backdrop-filter:blur(4px)}
.btn-sm:hover{border-color:var(--ac);color:var(--ac);box-shadow:0 2px 8px rgba(99,102,241,.08)}

/* Right tools */
.tb{padding:7px 10px;background:rgba(255,255,255,.6);border:1px solid var(--b);border-radius:8px;font-size:10px;color:var(--t2);cursor:pointer;transition:all .15s;margin-bottom:4px;backdrop-filter:blur(4px)}
.tb:hover{border-color:var(--ac);color:var(--ac);box-shadow:0 2px 8px rgba(99,102,241,.08)}

.steps-row{display:none;gap:12px;align-items:center;padding:4px 0}
.steps-row.on{display:flex}
.steps-row .si{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:4px}
.steps-row .si.active{color:var(--ac);font-weight:600}
.steps-row .si.done{color:#22C55E}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--t3)}
.empty-state .logo{font-size:32px;font-weight:700;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:.6}
.empty-state .tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.empty-state .tag{padding:6px 16px;background:rgba(255,255,255,.6);border:1px solid var(--b);border-radius:20px;font-size:11px;color:var(--t2);cursor:pointer;transition:all .15s;backdrop-filter:blur(4px)}
.empty-state .tag:hover{border-color:var(--ac);color:var(--ac);box-shadow:0 2px 8px rgba(99,102,241,.1)}

.ld{display:none;text-align:center;padding:24px}
.ld.on{display:block}
.sp{width:28px;height:28px;margin:0 auto 10px;border:2px solid var(--b);border-top-color:var(--ac);border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99;padding:8px 20px;border-radius:10px;font-size:12px;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(8px)}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;flex:1;overflow-y:auto}
.rcard{padding:12px;background:rgba(255,255,255,.7);border:1px solid var(--b);border-radius:10px;cursor:pointer;transition:all .18s;backdrop-filter:blur(4px)}
.rcard:hover{border-color:var(--ac);box-shadow:0 4px 16px rgba(99,102,241,.1);transform:translateY(-1px)}
.rcard .n{font-size:10px;color:var(--ac);font-weight:600}
.rcard .a{font-size:12px;font-weight:600;margin:4px 0}
.rcard .p{font-size:10px;color:var(--t2);padding-left:8px;border-left:2px solid var(--ac)}
#draftList{font-size:9px;color:var(--t2)}
#draftList .di{padding:4px 6px;cursor:pointer;transition:.12s;border-bottom:1px solid var(--b)}
#draftList .di:hover{color:var(--ac)}

@media(max-width:768px){.main{flex-direction:column}#left{width:100%;border-right:none;max-height:35vh}#right{width:100%}.workspace{padding:0 8px}.editor .body{min-height:150px}}
</style>
</head>
<body>

<div class="top">
  <b>Synapse Content Engine</b>
  <div class="actions">
    <button class="btn-ghost" onclick="doQuick('hot')">热点</button>
    <button class="btn-ghost" onclick="doQuick('viral')">爆款</button>
    <button class="btn-ghost" onclick="doQuick('search')">搜索</button>
    <button class="btn-ghost" onclick="exportMD()">导出</button>
    <span style="font-size:10px;color:var(--t3);margin:0 4px">v28</span>
  </div>
</div>

<div class="main">
<div class="panel" id="left">
  <div class="sec"><h3>创作方向</h3><div class="cg" id="cats"></div></div>
  <div class="sec"><h3>发布平台</h3><div class="pg" id="plats"></div></div>
  <div class="sec"><h3>风格设定</h3>
    <div class="sr"><label>语气</label><select id="tone"><option value="">智能</option><option value="humor">幽默</option><option value="serious">严肃</option><option value="warm">温暖</option><option value="sharp">犀利</option><option value="story">故事</option><option value="marketing">营销</option><option value="casual">口语</option></select></div>
    <div class="sr"><label>标题</label><select id="hstyle"><option value="">自动</option><option value="number">数字型</option><option value="question">疑问型</option><option value="suspense">悬念型</option><option value="contrast">对比型</option><option value="painpoint">痛点型</option></select></div>
    <div class="sr"><label>受众</label><select id="audience"><option value="">通用</option><option value="genz">Z世代</option><option value="expert">专家</option><option value="mom">宝妈</option></select></div>
    <div class="sr"><label>模板</label><select id="template"><option value="">灵活</option><option value="review">种草</option><option value="tutorial">教程</option><option value="story">故事</option><option value="opinion">观点</option><option value="list">清单</option></select></div>
    <div class="sr"><label>目标</label><select id="goal"><option value="">通用</option><option value="traffic">引流</option><option value="convert">转化</option><option value="brand">种草</option><option value="edu">科普</option></select></div>
    <div class="sr"><label>品牌</label><input type="text" id="brandName" placeholder="人设名" style="flex:1" onchange="saveBrand()"><input type="text" id="brandStyle" placeholder="风格" style="flex:1;margin-left:4px" onchange="saveBrand()"></div>
  </div>
</div>

<div class="panel" id="center">
  <div class="workspace">
    <div class="chips-row">
      <span class="chip" onclick="doQuick('outline')">大纲</span>
      <span class="chip" onclick="doPolish('expand')">扩写</span>
      <span class="chip" onclick="doPolish('compress')">精简</span>
      <span class="chip" onclick="doCompare()">对比</span>
    </div>
    <div class="steps-row" id="steps"><div class="si" id="si1">调研</div><div class="si" id="si2">撰写</div><div class="si" id="si3">评分</div></div>
    <div class="empty-state" id="empty">
      <div class="logo">Synapse</div>
      <div>多平台智能内容引擎</div>
      <div class="tags">
        <span class="tag" onclick="setTopic('AI效率工具推荐')">AI效率工具</span>
        <span class="tag" onclick="setTopic('打工人记账技巧')">每日记账</span>
        <span class="tag" onclick="setTopic('北京探店攻略2026')">北京探店</span>
        <span class="tag" onclick="setTopic('高效学习方法分享')">学习方法</span>
      </div>
    </div>
    <div class="editor" id="editorArea" style="display:none">
      <input type="text" class="tl" id="editTitle" placeholder="输入标题...">
      <textarea class="body" id="editBody" placeholder="输入主题或直接粘贴你的文案..."></textarea>
      <div class="bar">
        <span class="meta">字数 <b id="wordCount">0</b> <span id="editorMeta"></span> <span id="platSwitcher"></span></span>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn-sm" onclick="saveDraft()">保存</button>
          <button class="btn-sm" onclick="loadDraft()">草稿</button>
          <button class="btn-gen" id="btnGen" onclick="doGen()">生成</button>
        </div>
      </div>
    </div>
    <div class="ld" id="ld"><div class="sp"></div><div id="lt" style="font-size:11px;color:var(--t3)">处理中...</div></div>
  </div>
</div>

<div class="panel" id="right">
  <div class="sec"><h3>润色工具</h3>
    <div class="tb" onclick="doPolish('rewrite')">改写表达</div>
    <div class="tb" onclick="doPolish('formal')">正式语气</div>
    <div class="tb" onclick="doPolish('casual')">口语风格</div>
    <div class="tb" onclick="doPolish('viral')">爆款优化</div>
    <div class="tb" onclick="doPolish('translate')">翻译英文</div>
    <div class="tb" onclick="doPolish('format')">自动排版</div>
  </div>
  <div class="sec"><h3>草稿</h3><div id="draftList"></div></div>
</div>
</div>
<div id="toast"></div>

<script>
var S={cats:{},platforms:{},allPlatforms:{},currentPlatform:'',abortCtrl:null};
function t(m,ty){var bg={error:'#EF4444',ok:'#22C55E',warn:'#F59E0B'};var e=document.getElementById('toast');e.style.background=bg[ty]||bg.warn;e.style.color='#fff';e.style.opacity='1';e.textContent=m;clearTimeout(e._t);e._t=setTimeout(function(){e.style.opacity='0'},2500)}
function setTopic(v){document.getElementById('editBody').value=v;showEditor();t('已填入','ok')}
function showEditor(){document.getElementById('empty').style.display='none';document.getElementById('editorArea').style.display='flex'}
function showRight(){document.getElementById('right').style.display='block'}
function getPlats(){var a=[];document.querySelectorAll('#plats .pi.on').forEach(function(c){a.push(c.dataset.k)});return a}
function getCats(){var a=[];document.querySelectorAll('#cats .ci.on').forEach(function(c){a.push(c.dataset.k)});return a}
function busyOn(m){document.getElementById('btnGen').disabled=true;document.getElementById('ld').className='ld on';if(m)document.getElementById('lt').textContent=m}
function busyOff(){document.getElementById('btnGen').disabled=false;document.getElementById('btnGen').className='btn-gen';document.getElementById('btnGen').onclick=doGen;document.getElementById('btnGen').textContent='生成';document.getElementById('ld').className='ld'}

async function init(){
  try{var r=await fetch('/api/config');var d=await r.json();S.cats=d.categories;S.platforms=d.platforms}catch(e){initFallback();return}
  renderUI();t('就绪','ok');
}
function initFallback(){
  S.cats={ai_special:{name:'AI专版'},hot_news:{name:'社会热点'},ming_history:{name:'明朝历史'},urban_geo:{name:'城市人文'},tech_frontier:{name:'科技前沿'},business:{name:'商业财经'},career:{name:'职场成长'},emotion:{name:'情感心理'},local_life:{name:'本地生活'},education:{name:'教育培训'}};
  S.platforms={xiaohongshu:{name:'小红书'},douyin:{name:'抖音'},zhihu:{name:'知乎'},bilibili:{name:'B站'},gongzhonghao:{name:'公众号'},shipinhao:{name:'视频号'},kuaishou:{name:'快手'}};
  renderUI();
}
function renderUI(){
  var cg=document.getElementById('cats');Object.keys(S.cats).forEach(function(k){var d=document.createElement('div');d.className='ci';d.dataset.k=k;d.textContent=S.cats[k].name;d.onclick=function(){d.classList.toggle('on')};cg.appendChild(d)});
  var pg=document.getElementById('plats');Object.keys(S.platforms).forEach(function(k){var d=document.createElement('div');d.className='pi on';d.dataset.k=k;d.innerHTML='<span class="ico">'+'</span>'+S.platforms[k].name;d.onclick=function(){d.classList.toggle('on')};pg.appendChild(d)});
  loadBrand();
}
function loadBrand(){try{var b=JSON.parse(localStorage.getItem('synapse_brand')||'{}');if(b.name)document.getElementById('brandName').value=b.name;if(b.style)document.getElementById('brandStyle').value=b.style}catch(e){}}
function saveBrand(){var n=document.getElementById('brandName').value,s=document.getElementById('brandStyle').value;localStorage.setItem('synapse_brand',JSON.stringify({name:n,style:s}))}
init();

async function doQuick(type){
  if(type==='hot'){var cats=getCats();busyOn('抓取热点...');
    try{var r=await fetch('/api/hot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:cats[0]||'ai_special'})});var d=await r.json();
      if(d.success&&d.topics.length){document.getElementById('empty').innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">'+d.topics.slice(0,6).map(function(tp,i){return'<div class="rcard" onclick="setTopic(\''+(tp.title||'').replace(/'/g,'\\\'')+'\')" style="text-align:center"><div class="n">#'+(i+1)+' · '+tp.score+'</div><div class="a">'+tp.title+'</div></div>'}).join('')+'</div>';t('点击填入','ok')}}catch(e){}}busyOff();return}
  if(type==='viral'){var plats=getPlats();if(!plats.length)return;busyOn('抓取爆款...');
    try{var fr=await fetch('/api/fetch-viral',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({platform:plats[0]})});var fd=await fr.json();
      if(fd.success&&fd.posts.length){document.getElementById('empty').innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">'+fd.posts.slice(0,6).map(function(p,i){return'<div class="rcard" onclick="setTopic(\''+(p.title||'').replace(/'/g,'\\\'')+'\')"><div class="n">#'+(i+1)+'</div><div class="a">'+p.title+'</div></div>'}).join('')+'</div>';t('点击填入','ok')}}catch(e){}}
  busyOff();return}
  if(type==='outline'){var topic=document.getElementById('editBody').value.trim();if(!topic){t('输入主题','warn');return}
    busyOn('大纲...');showEditor();
    try{var r2=await fetch('/api/polish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'为【'+topic+'】生成5要点大纲，每行-开头',action:'format'})});var d2=await r2.json();
      if(d2.success){document.getElementById('editBody').value=d2.polished;document.getElementById('wordCount').textContent=d2.polished.length;t('大纲已生成','ok')}}catch(e){}busyOff();return}
  if(type==='search'){t('输入主题后点击生成','warn')}
}

async function doGen(){
  var topic=document.getElementById('editBody').value.trim();if(!topic){t('输入主题','warn');return}
  var plats=getPlats();if(!plats.length){t('选平台','warn');return}
  var cats=getCats();S.abortCtrl=new AbortController();showEditor();
  document.getElementById('si1').className='si active';document.getElementById('si2').className='si';document.getElementById('si3').className='si';document.getElementById('steps').className='steps-row on';
  document.getElementById('btnGen').textContent='停止';document.getElementById('btnGen').className='btn-gen stop';document.getElementById('btnGen').onclick=stopGen;
  busyOn('生成中...');
  try{
    var r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:topic,platforms:plats,categories:cats,tone:document.getElementById('tone').value,headlineStyle:document.getElementById('hstyle').value,audience:document.getElementById('audience').value,template:document.getElementById('template').value,goal:document.getElementById('goal').value,brandName:document.getElementById('brandName').value,brandStyle:document.getElementById('brandStyle').value}),signal:S.abortCtrl.signal});
    document.getElementById('si1').className='si done';document.getElementById('si2').className='si active';
    var d=await r.json();if(!d.success){t(d.error,'error');busyOff();return}
    document.getElementById('si2').className='si done';document.getElementById('si3').className='si done';
    showPlatforms(d.platforms,d.scores);t('完成','ok');
  }catch(e){if(e.name!=='AbortError')t('错误','error')}busyOff();
}
function stopGen(){if(S.abortCtrl){S.abortCtrl.abort();S.abortCtrl=null}t('已停止','warn');busyOff()}

function showPlatforms(d,scs){S.allPlatforms=d;var keys=Object.keys(d||{});if(!keys.length)return;injectPlatform(keys[0],d,scs);renderSwitcher(keys);showRight()}
function injectPlatform(k,d,scs){S.currentPlatform=k;var p=d[k],s=scs&&scs[k]?scs[k]:null;
  document.getElementById('editTitle').value=p.title||'';document.getElementById('editBody').value=p.body||'';document.getElementById('wordCount').textContent=(p.body||'').length;
  document.getElementById('editorMeta').textContent=S.platforms[k].name+(s&&s.total?' | '+s.total+'分':'')}
function renderSwitcher(keys){var ps=document.getElementById('platSwitcher');if(!keys||keys.length<=1){ps.innerHTML='';return}
  ps.innerHTML='<select onchange="switchPlat(this.value)" style="background:rgba(255,255,255,.5);border:1px solid var(--b);border-radius:6px;font-size:9px;padding:3px 6px">'+keys.map(function(k){return'<option value="'+k+'"'+(k===S.currentPlatform?' selected':'')+'>'+S.platforms[k].name+'</option>'}).join('')+'</select>'}
function switchPlat(k){if(!S.allPlatforms[k])return;injectPlatform(k,S.allPlatforms,null);renderSwitcher(Object.keys(S.allPlatforms))}

async function doPolish(action){var text=document.getElementById('editBody').value.trim();if(!text){t('无内容','warn');return}
  lastOriginal=text;t('润色中...','warn');
  try{var r=await fetch('/api/polish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text,action:action})});var d=await r.json();
    if(d.success){document.getElementById('editBody').value=d.polished;document.getElementById('wordCount').textContent=d.polished.length;t('完成','ok')}}catch(e){}}
var lastOriginal='';
function doCompare(){var current=document.getElementById('editBody').value;document.getElementById('editBody').value='═══ 原版 ═══\n'+(lastOriginal||'暂无').substring(0,600)+'\n\n═══ 当前 ═══\n'+current.substring(0,600);t('已展示','ok')}

function saveDraft(){var t=document.getElementById('editTitle').value,b=document.getElementById('editBody').value;if(!b.trim())return;var drafts=JSON.parse(localStorage.getItem('drafts')||'[]');drafts.unshift({title:t,text:b,time:new Date().toISOString()});localStorage.setItem('drafts',JSON.stringify(drafts.slice(0,20)));t('已保存','ok');refreshDrafts()}
function loadDraft(){var drafts=JSON.parse(localStorage.getItem('drafts')||'[]');if(!drafts.length){t('无草稿','warn');return}var d=drafts[0];document.getElementById('editTitle').value=d.title;document.getElementById('editBody').value=d.text;showEditor();t('已加载','ok')}
function refreshDrafts(){var drafts=JSON.parse(localStorage.getItem('drafts')||'[]');document.getElementById('draftList').innerHTML=drafts.map(function(d,i){return'<div class="di" onclick="loadDraftItem('+i+')">'+(i+1)+'.'+(d.title||'').substring(0,20)+'</div>'}).join('')}
function loadDraftItem(i){var drafts=JSON.parse(localStorage.getItem('drafts')||'[]');if(!drafts[i])return;document.getElementById('editTitle').value=drafts[i].title;document.getElementById('editBody').value=drafts[i].text;showEditor()}
function exportMD(){var t1=document.getElementById('editTitle').value,b=document.getElementById('editBody').value;var md='# '+t1+'\n\n'+b;var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'}));a.download='synapse.md';a.click();t('已下载','ok')}
refreshDrafts();
</script>
