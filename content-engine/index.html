<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse Content Engine v13 — 灵枢</title>
<style>
:root{--c:#00F0FF;--p:#8A2BE2;--bg:#0A0A14;--s:#111122;--i:#0D0D1F;--b:#1a1a3a;--t:#e0e0e0;--m:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t);overflow:hidden;height:100vh}
.top{background:var(--s);border-bottom:1px solid var(--b);padding:8px 16px;display:flex;justify-content:space-between;align-items:center}
.top b{background:linear-gradient(135deg,var(--c),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(0,240,255,.08);color:var(--c);border:1px solid rgba(0,240,255,.15)}
.stat{font-size:10px;color:var(--m)}

.main{display:flex;height:calc(100vh - 36px)}

.panel{overflow-y:auto;padding:12px}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}

#left{width:300px;border-right:1px solid var(--b);background:rgba(10,10,20,.5);flex-shrink:0}
#center{flex:1;border-right:1px solid var(--b)}
#right{width:320px;flex-shrink:0;display:none}

.box{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:12px;margin-bottom:10px}
.box h3{font-size:11px;color:var(--m);margin-bottom:8px;letter-spacing:1px}

.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip,.pchip{padding:5px 10px;border-radius:14px;font-size:10px;cursor:pointer;border:1px solid var(--b);color:var(--m);transition:.15s;user-select:none}
.chip:hover,.pchip:hover{border-color:rgba(0,240,255,.3);color:var(--t)}
.chip.on,.pchip.on{border-color:var(--c);color:var(--c);background:rgba(0,240,255,.05)}

.g{width:100%}
.g input,.g textarea{width:100%;background:var(--i);border:1px solid var(--b);border-radius:6px;padding:8px 10px;color:var(--t);font-size:12px;outline:none;font-family:inherit}
.g input:focus,.g textarea:focus{border-color:var(--c)}
.g textarea{resize:vertical;min-height:50px}

.btn{padding:8px 16px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn1{background:linear-gradient(135deg,var(--c),#0088cc);color:#000}
.btn1:hover{box-shadow:0 0 12px rgba(0,240,255,.2)}
.btn1:disabled{opacity:.5;box-shadow:none;cursor:not-allowed}
.btn2{background:transparent;border:1px solid var(--b);color:var(--m)}
.btn2:hover{border-color:var(--c);color:var(--c)}
.btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}

.st{font-size:10px;color:var(--m);margin-top:4px}

.ld{display:none;text-align:center;padding:16px}
.ld.on{display:block}
.sp{width:24px;height:24px;margin:0 auto 8px;border:2px solid var(--b);border-top-color:var(--c);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:60px 20px;color:var(--m);font-size:12px}

.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:6px}
.rcard{background:var(--i);border:1px solid var(--b);border-radius:6px;padding:8px 10px;cursor:pointer;transition:.15s}
.rcard:hover{border-color:var(--c)}
.rcard .num{font-size:9px;color:var(--c);margin-bottom:2px}
.rcard .ang{font-size:12px;font-weight:600}
.rcard .pt{font-size:10px;color:var(--m);margin:2px 0;padding-left:6px;border-left:2px solid var(--b)}

.pgrid{display:flex;flex-direction:column;gap:8px}
.pcard{background:var(--s);border:1px solid var(--b);border-radius:8px;overflow:hidden;cursor:pointer;transition:.15s}
.pcard:hover{border-color:rgba(0,240,255,.2)}
.pcard.on{border-color:var(--c)}
.phead{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;font-size:11px;border-bottom:1px solid var(--b)}
.pbody{padding:10px 12px;max-height:180px;overflow:hidden}
.pbody .tl{font-size:13px;font-weight:600;color:var(--c);margin-bottom:4px}
.pbody .tx{font-size:11px;line-height:1.6;white-space:pre-wrap;opacity:.8}
.score{font-size:10px;font-weight:700}

.vgrid{display:flex;flex-direction:column;gap:6px}
.vcard{padding:10px;background:var(--i);border-left:2px solid var(--c);border-radius:0 6px 6px 0;cursor:pointer}
.vcard .vt{font-size:11px;font-weight:600}
.vcard .vd{font-size:9px;color:var(--m);margin:2px 0}
.vcard .vs{font-size:9px;padding:4px 6px;margin-top:3px;background:rgba(0,240,255,.03);border-radius:4px;color:var(--c)}

#right .detail-content{font-size:12px;line-height:1.7;white-space:pre-wrap}
#right .detail-title{font-size:15px;font-weight:700;color:var(--c);margin-bottom:10px}
#toast{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:99;padding:7px 16px;border-radius:6px;font-size:11px;font-weight:600;opacity:0;pointer-events:none;transition:.3s}
</style>
</head>
<body>

<div class="top"><b>Synapse Content Engine</b><div><span class="badge">v13</span><span class="stat" id="svr" style="margin-left:8px">🟢</span></div></div>

<div class="main">

<div class="panel" id="left">
  <div class="box"><h3>内容方向</h3><div class="chips" id="cats"></div></div>
  <div class="box"><h3>发布平台</h3><div class="chips" id="plats"></div></div>
  <div class="box">
    <div class="g"><input type="text" id="topic" placeholder="输入主题，如：AI效率工具推荐..."></div>
    <div class="btns">
      <button class="btn btn1" id="btnGen" onclick="doGen()">生成</button>
      <button class="btn btn2" onclick="doHot()">热点</button>
      <button class="btn btn2" onclick="doViral()">爆款</button>
      <button class="btn btn2" onclick="doSearch()">搜索+生成</button>
      <button class="btn btn2" onclick="doClr()">清除</button>
    </div>
    <!-- 搜索面板 -->
    <div id="sp" style="display:none;margin-top:6px">
      <div class="g"><input type="text" id="skw" placeholder="自定义搜索关键词..."></div>
      <div class="btns">
        <button class="btn btn2" onclick="doCustomSearch()">仅搜索</button>
        <button class="btn btn1" style="padding:6px 12px;font-size:10px" onclick="doFullPipe()">搜+拆+生成</button>
      </div>
    </div>
  </div>
  <div class="st"><span id="status">就绪</span></div>
  <div class="ld" id="ld"><div class="sp"></div><div id="lt" style="font-size:10px;color:var(--m)">处理中...</div></div>
</div>

<div class="panel" id="center">
  <div class="empty" id="empty">选择一个操作开始...<br><span style="font-size:10px;color:var(--p)">输入主题 → 点生成 / 热点 / 爆款</span></div>
  <div id="out" style="display:none">
    <div class="box" id="rbox" style="display:none"><h3>调研结果</h3><div class="rgrid" id="rag"></div></div>
    <div class="box" id="vbox" style="display:none"><h3>爆款拆解</h3><div class="vgrid" id="vg"></div></div>
    <div class="pgrid" id="pg"></div>
  </div>
</div>

<div class="panel" id="right">
  <div class="empty">点击左侧生成的卡片<br>查看详情</div>
  <div id="detail" style="display:none">
    <div class="detail-title" id="dTitle"></div>
    <div class="box"><h3>Critic 评分</h3><div id="dScore"></div></div>
    <div class="detail-content" id="dBody"></div>
  </div>
</div>

</div>
<div id="toast"></div>

<script>
var CATS={},PLATS={},actCat=null,busy=false,sType='both';

function t(m,ty){var e=document.getElementById('toast');e.style.background={error:'#E24B4A',ok:'#00cc66',warn:'#EF9F27'}[ty]||'#333';e.style.color='#fff';e.style.opacity='1';e.textContent=m;clearTimeout(e._t);e._t=setTimeout(function(){e.style.opacity='0'},2500)}
function sc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function busyOn(m){busy=true;document.getElementById('btnGen').disabled=true;document.getElementById('ld').className='ld on';if(m)document.getElementById('lt').textContent=m}
function busyOff(){busy=false;document.getElementById('btnGen').disabled=false;document.getElementById('ld').className='ld'}
function st(s){document.getElementById('status').textContent=s}
function showOut(){document.getElementById('empty').style.display='none';document.getElementById('out').style.display='block'}
function showRight(){document.getElementById('right').style.display='block'}
function getPlats(){var a=[];document.querySelectorAll('#plats .pchip.on').forEach(function(c){a.push(c.dataset.k)});return a}

async function init(){
  try{var r=await fetch('/api/config');var d=await r.json();CATS=d.categories;PLATS=d.platforms}catch(e){initFallback();return}
  renderChips();
  t('已连接','ok');
}
function initFallback(){
  CATS={ai_special:{name:'AI专版',icon:'🤖'},hot_news:{name:'社会热点',icon:'🔥'},ming_history:{name:'明朝历史',icon:'🏯'},urban_geo:{name:'城市人文',icon:'🏙️'},tech_frontier:{name:'科技前沿',icon:'🚀'}};
  PLATS={xiaohongshu:{name:'小红书',icon:'📕'},douyin:{name:'抖音',icon:'🎵'},zhihu:{name:'知乎',icon:'🔵'},bilibili:{name:'B站',icon:'💗'},gongzhonghao:{name:'公众号',icon:'💚'},shipinhao:{name:'视频号',icon:'👁️'},kuaishou:{name:'快手',icon:'🧡'}};
  renderChips();t('离线模式','warn');
}
function renderChips(){
  var cg=document.getElementById('cats'),pg=document.getElementById('plats');
  Object.keys(CATS).forEach(function(k){var d=document.createElement('span');d.className='chip';d.dataset.k=k;d.innerHTML=CATS[k].icon+' '+CATS[k].name;d.onclick=function(){actCat=k;document.querySelectorAll('#cats .chip').forEach(function(c){c.classList.remove('on')});d.classList.add('on')};cg.appendChild(d)});
  Object.keys(PLATS).forEach(function(k){var d=document.createElement('span');d.className='pchip on';d.dataset.k=k;d.innerHTML=PLATS[k].icon;d.title=PLATS[k].name;d.onclick=function(){d.classList.toggle('on')};pg.appendChild(d)});
}
init();

setInterval(function(){fetch('/api/health').then(function(){document.getElementById('svr').textContent='🟢'}).catch(function(){document.getElementById('svr').textContent='🔴'})},10000);

function doClr(){document.getElementById('out').style.display='none';document.getElementById('empty').style.display='block';document.getElementById('rbox').style.display='none';document.getElementById('vbox').style.display='none';document.getElementById('right').style.display='none';document.getElementById('detail').style.display='none';document.getElementById('status').textContent='就绪'}

function doSearch(){var p=document.getElementById('sp');p.style.display=p.style.display==='none'?'block':'none'}

async function doGen(){
  var topic=document.getElementById('topic').value.trim();if(!topic){t('请输入主题','warn');return}
  var plats=getPlats();if(!plats.length){t('请选择平台','warn');return}
  busyOn('🔬 调研...');st('调研中');doClr();showOut();
  try{
    var r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:topic,platforms:plats,category:actCat})});
    var d=await r.json();if(!d.success){t(d.error,'error');busyOff();return}
    showResearch(d.research);showPlatforms(d.platforms,d.scores);st('完成 '+plats.length+'平台');t('已生成','ok');
  }catch(e){t('错误','error')}
  busyOff();
}

async function doHot(){
  var cat=actCat||'ai_special';busyOn('🔥 抓取');st('抓取中');doClr();showOut();
  try{
    var r=await fetch('/api/hot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:cat})});
    var d=await r.json();if(!d.success){t(d.error,'error');busyOff();return}
    document.getElementById('rbox').style.display='block';
    showHotTopics(d.topics,cat);st(d.topics.length+'条热点');t('可点击热点生成','ok');
  }catch(e){t('错误','error')}
  busyOff();
}

async function doViral(){
  var plats=getPlats();if(!plats.length){t('请选平台','warn');return}var pk=plats[0];
  busyOn('🔍 拆解');st('抓取中');doClr();showOut();
  try{
    var fr=await fetch('/api/fetch-viral',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({platform:pk,category:actCat})});
    var fd=await fr.json();if(!fd.success||!fd.posts.length){t('未抓到','error');busyOff();return}
    var a=[];for(var i=0;i<fd.posts.length;i++){st('拆解'+(i+1)+'/'+fd.posts.length);var ar=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:fd.posts[i].title+'\n\n'+fd.posts[i].body,platform:pk})});var ad=await ar.json();if(ad.success)a.push({p:fd.posts[i],a:ad.analysis})}
    showViral(a,pk);st('拆解'+a.length+'条');t('完成','ok');
  }catch(e){t('错误','error')}
  busyOff();
}

async function doCustomSearch(){
  var kw=document.getElementById('skw').value.trim();if(!kw){t('输入关键词','warn');return}var plats=getPlats();if(!plats.length){t('选平台','warn');return}
  busyOn('🔎 搜索');st('搜索中');doClr();showOut();
  try{
    var r=await fetch('/api/hot-custom',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keyword:kw,platforms:plats})});
    var d=await r.json();if(!d.success){t(d.error,'error');busyOff();return}
    document.getElementById('rbox').style.display='block';showHotTopics(d.topics,null);st(d.topics.length+'条');t('完成','ok');
  }catch(e){t('错误','error')}
  busyOff();
}

async function doFullPipe(){
  var kw=document.getElementById('skw').value.trim();if(!kw){t('输入关键词','warn');return}var plats=getPlats();if(!plats.length){t('选平台','warn');return}
  busyOn('🔗 全链路');st('搜索→拆解→生成...');doClr();showOut();
  try{
    var r=await fetch('/api/search-generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keyword:kw,platforms:plats,searchType:sType})});
    var d=await r.json();if(!d.success){t(d.error,'error');busyOff();return}
    if(d.analyzed){document.getElementById('vbox').style.display='block';showViral(d.analyzed.map(function(x){return{p:x.post,a:x.analysis}}),plats[0])}
    if(d.generated){showPlatforms(d.generated)}showRight();
    st('完成 '+Object.keys(d.generated||{}).length+'篇');t('搜索+拆解+生成完成','ok');
  }catch(e){t('错误','error')}
  busyOff();
}

function showResearch(d){
  if(!d||!Array.isArray(d)){document.getElementById('rbox').style.display='none';return}
  document.getElementById('rbox').style.display='block';
  document.getElementById('rag').innerHTML=d.map(function(r,i){return'<div class="rcard"><div class="num">角度'+(i+1)+'</div><div class="ang">'+sc(r.angle||'')+'</div>'+(r.keyPoints||[]).map(function(p){return'<div class="pt">'+sc(p)+'</div>'}).join('')+'</div>'}).join('');
}

function showHotTopics(topics,cat){
  document.getElementById('rag').innerHTML='<div class="rcard" style="grid-column:1/-1">🔥 '+(cat?CATS[cat].name:'')+' · '+topics.length+'条 (点击生成)</div>'+
    topics.map(function(tp,i){return'<div class="rcard" style="cursor:pointer" onclick="document.getElementById(\'topic\').value=\''+(tp.title||'').replace(/'/g,'\\\'')+'\';doGen()"><div class="num">#'+(i+1)+' · '+tp.score+'热度</div><div class="ang">'+sc(tp.title)+'</div><div class="pt">'+sc(tp.source||'')+'</div></div>'}).join('');
}

function showPlatforms(d,scs){
  document.getElementById('pg').innerHTML=Object.keys(d||{}).map(function(k){
    var p=d[k],pl=PLATS[k]||{},s=scs&&scs[k]?scs[k]:null;
    var scoreHtml=s?'<span class="score" style="color:'+(s.total>=80?'#00cc66':s.total>=60?'#EF9F27':'#E24B4A')+'">⭐'+s.total+'</span>':'';
    return'<div class="pcard" onclick="showDetail(\''+k+'\',\''+(p.title||'').replace(/'/g,'\\\'')+'\',\''+(p.body||'').replace(/\n/g,'\\n').replace(/'/g,'\\\'')+'\',\''+JSON.stringify(s||{}).replace(/'/g,'\\\'')+'\')"><div class="phead"><span>'+pl.icon+' <b>'+pl.name+'</b> '+(p.body||'').length+'字</span>'+scoreHtml+'</div><div class="pbody"><div class="tl">'+sc(p.title||'')+'</div><div class="tx">'+sc((p.body||'').substring(0,150))+'...</div></div></div>';
  }).join('');
}

function showViral(items,plat){
  document.getElementById('vbox').style.display='block';
  document.getElementById('vg').innerHTML='<div style="font-size:10px;color:var(--m);margin-bottom:6px">'+(PLATS[plat]||{}).name+' Top'+items.length+'爆款</div>'+
    items.map(function(x,i){var a=x.a,p=x.p,sc2=parseInt(a.score)||0,scC=sc2>=80?'#00cc66':sc2>=60?'#EF9F27':'#E24B4A';
      return'<div class="vcard"><span class="score" style="float:right;color:'+scC+'">⭐'+sc2+'</span><div class="vt">#'+(i+1)+' '+sc((p.title||'').substring(0,50))+'</div>'+(a.hookAnalysis?'<div class="vd">🎣 '+sc(a.hookAnalysis)+'</div>':'')+(a.reusableTemplate?'<div class="vs">📋 '+sc(a.reusableTemplate)+'</div>':'')+'</div>';
    }).join('');
}

function showDetail(k,title,body,scoreStr){
  showRight();document.getElementById('detail').style.display='block';document.getElementById('right').querySelector('.empty').style.display='none';
  document.getElementById('dTitle').textContent=title;
  document.getElementById('dBody').textContent=body.replace(/\\n/g,'\n');
  try{
    var s=JSON.parse(scoreStr.replace(/\\'/g,"'"));
    if(s.total)document.getElementById('dScore').innerHTML='<span style="font-size:18px;color:#00cc66;font-weight:700">⭐'+s.total+'/100</span><br><span style="font-size:10px;color:var(--m)">🎣'+s.hookQuality+' 📐'+s.structureQuality+' 🎯'+s.platformFit+' 💓'+s.emotionCurve+' 💡'+s.actionability+'</span>'+(s.suggestions?'<br><span style="font-size:9px;color:var(--m)">💡 '+s.suggestions.join(' | ')+'</span>':'');
  }catch(e){}
}
</script>
</body>
</html>
