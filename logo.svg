<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
<defs>
  <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00F0FF"/>
    <stop offset="100%" stop-color="#8A2BE2"/>
  </linearGradient>
</defs>
<rect width="320" height="120" fill="#0a0a12" rx="8"/>

<!-- 灵枢 - central hub -->
<circle cx="60" cy="60" r="18" fill="none" stroke="#00F0FF" stroke-width="2" opacity=".9"/>
<circle cx="60" cy="60" r="8" fill="none" stroke="#00F0FF" stroke-width="1.5" opacity=".5"/>
<circle cx="60" cy="60" r="3" fill="#00F0FF"/>

<!-- 五条经络线连接五个子系统 -->
<!-- Claude Code -->
<line x1="78" y1="60" x2="120" y2="30" stroke="#00F0FF" stroke-width="1.2" opacity=".4"/>
<circle cx="124" cy="28" r="6" fill="none" stroke="#00F0FF" stroke-width="1.5"/>
<circle cx="124" cy="28" r="2" fill="#00F0FF"/>

<!-- Codex -->
<line x1="78" y1="60" x2="120" y2="52" stroke="#8A2BE2" stroke-width="1.2" opacity=".5"/>
<circle cx="124" cy="52" r="6" fill="none" stroke="#8A2BE2" stroke-width="1.5"/>
<circle cx="124" cy="52" r="2" fill="#8A2BE2"/>

<!-- Agent Browser -->
<line x1="78" y1="60" x2="120" y2="74" stroke="#00F0FF" stroke-width="1" opacity=".35"/>
<circle cx="124" cy="74" r="5" fill="none" stroke="#00F0FF" stroke-width="1.2"/>
<circle cx="124" cy="74" r="1.5" fill="#00F0FF"/>

<!-- GitHub -->
<line x1="78" y1="60" x2="120" y2="95" stroke="#8A2BE2" stroke-width="1" opacity=".35"/>
<circle cx="124" cy="95" r="5" fill="none" stroke="#8A2BE2" stroke-width="1.2"/>
<circle cx="124" cy="95" r="1.5" fill="#8A2BE2"/>

<!-- Data flow particles -->
<circle cx="95" cy="42" r="2" fill="#00F0FF" opacity=".7"/>
<circle cx="100" cy="56" r="2.5" fill="#8A2BE2" opacity=".8"/>
<circle cx="98" cy="68" r="1.8" fill="#00F0FF" opacity=".6"/>

<!-- 灵枢文字 -->
<text x="150" y="56" font-family="'Noto Serif SC','SimSun',serif" font-size="28" font-weight="700" fill="#8A2BE2" opacity=".9">灵枢</text>
<text x="150" y="75" font-family="'Inter','Segoe UI',sans-serif" font-size="11" font-weight="400" fill="#64748b" letter-spacing="3">SYNAPSE</text>
</svg>
