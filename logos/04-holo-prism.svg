<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowP">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowS">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#070714"/>
      <stop offset="50%" stop-color="#0B0B1E"/>
      <stop offset="100%" stop-color="#070714"/>
    </linearGradient>
    <linearGradient id="prismTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="prismLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8A2BE2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="prismRight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8A2BE2" stop-opacity="0.04"/>
    </linearGradient>
    <radialGradient id="coreLight">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#00F0FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Core light source -->
  <circle cx="270" cy="200" r="80" fill="url(#coreLight)" opacity="0.25"/>

  <!-- 3D Prism Structure -->
  <g transform="translate(250, 190)">

    <!-- Back face (darker) -->
    <polygon points="-80,-100 80,-100 150,0 0,40" fill="none" stroke="#00F0FF" stroke-width="0.5" opacity="0.15"/>

    <!-- Left face -->
    <polygon points="-80,-100 0,40 -80,100 -150,0"
      fill="rgba(138,43,226,0.04)" stroke="#8A2BE2" stroke-width="1.2" filter="url(#glowP)" opacity="0.5"/>

    <!-- Right face -->
    <polygon points="80,-100 150,0 80,100 0,40"
      fill="rgba(0,240,255,0.04)" stroke="#00F0FF" stroke-width="1.2" filter="url(#glow)" opacity="0.5"/>

    <!-- Top face -->
    <polygon points="-80,-100 0,-140 80,-100 0,-60"
      fill="rgba(0,240,255,0.06)" stroke="#00F0FF" stroke-width="1" filter="url(#glowS)" opacity="0.6"/>

    <!-- Bottom face -->
    <polygon points="-80,100 0,60 80,100 0,140"
      fill="rgba(138,43,226,0.04)" stroke="#8A2BE2" stroke-width="0.8" filter="url(#glowS)" opacity="0.3"/>

    <!-- Top edges (bright) -->
    <line x1="-80" y1="-100" x2="0" y2="-140" stroke="#00F0FF" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
    <line x1="80" y1="-100" x2="0" y2="-140" stroke="#00F0FF" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
    <line x1="-80" y1="-100" x2="80" y2="-100" stroke="#00F0FF" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>

    <!-- Vertical edges -->
    <line x1="-80" y1="-100" x2="-80" y2="100" stroke="#8A2BE2" stroke-width="1.2" filter="url(#glowP)" opacity="0.5"/>
    <line x1="80" y1="-100" x2="80" y2="100" stroke="#00F0FF" stroke-width="1.2" filter="url(#glow)" opacity="0.45"/>

    <!-- Internal crystal nodes -->
    <circle cx="0" cy="-20" r="3" fill="#00F0FF" filter="url(#glow)" opacity="0.8"/>
    <circle cx="0" cy="-20" r="1" fill="#fff" opacity="0.9"/>

    <circle cx="-30" cy="20" r="2" fill="#8A2BE2" filter="url(#glowP)" opacity="0.6"/>
    <circle cx="30" cy="20" r="2" fill="#00F0FF" filter="url(#glow)" opacity="0.6"/>

    <circle cx="0" cy="50" r="1.5" fill="#8A2BE2" filter="url(#glowP)" opacity="0.4"/>
    <circle cx="-50" cy="-40" r="1.5" fill="#00F0FF" filter="url(#glow)" opacity="0.4"/>
    <circle cx="50" cy="-40" r="1.5" fill="#8A2BE2" filter="url(#glowP)" opacity="0.4"/>
  </g>

  <!-- Light refraction beams -->
  <g opacity="0.12">
    <line x1="270" y1="90" x2="150" y2="20" stroke="#00F0FF" stroke-width="0.8"/>
    <line x1="270" y1="90" x2="400" y2="20" stroke="#00F0FF" stroke-width="0.8"/>
    <line x1="270" y1="90" x2="270" y2="0" stroke="#fff" stroke-width="1.5"/>
    <line x1="170" y1="200" x2="80" y2="200" stroke="#8A2BE2" stroke-width="0.6"/>
    <line x1="380" y1="200" x2="480" y2="200" stroke="#8A2BE2" stroke-width="0.6"/>
    <line x1="170" y1="200" x2="120" y2="150" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="380" y1="200" x2="430" y2="150" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="170" y1="250" x2="120" y2="320" stroke="#8A2BE2" stroke-width="0.5"/>
    <line x1="380" y1="250" x2="430" y2="320" stroke="#8A2BE2" stroke-width="0.5"/>
  </g>

  <!-- Holographic scan line -->
  <line x1="120" y1="180" x2="420" y2="180" stroke="#00F0FF" stroke-width="0.3" opacity="0.15" stroke-dasharray="4 8"/>
  <line x1="120" y1="260" x2="420" y2="260" stroke="#8A2BE2" stroke-width="0.3" opacity="0.12" stroke-dasharray="4 8"/>

  <!-- Text -->
  <text x="500" y="175" font-family="'Noto Serif SC','SimSun','Microsoft YaHei',serif"
    font-size="54" font-weight="700" fill="#00F0FF" filter="url(#glow)" opacity="0.95">灵枢</text>
  <text x="500" y="212" font-family="'Inter','Segoe UI','Helvetica Neue',sans-serif"
    font-size="14" font-weight="300" fill="#8A2BE2" letter-spacing="6" opacity="0.8">SYNAPSE</text>
  <text x="500" y="242" font-family="'Inter','Segoe UI','Helvetica Neue',sans-serif"
    font-size="9" font-weight="300" fill="#4a5568" letter-spacing="4" opacity="0.6">MULTI-AGENT SYSTEM</text>
  <line x1="500" y1="227" x2="680" y2="227" stroke="#00F0FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="500" y1="249" x2="630" y2="249" stroke="#8A2BE2" stroke-width="0.5" opacity="0.2"/>
</svg>