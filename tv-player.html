<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📺 全球电视直播 - WorkBuddy</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root{--bg:#0a0a12;--card:#1a1b2a;--border:#252840;--blue:#60a5fa;--green:#4ade80;--red:#f87171;--purple:#a78bfa;--text:#e2e8f0;--muted:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex}
.sidebar{width:300px;background:#11131e;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sd-h{padding:20px;border-bottom:1px solid var(--border)}
.sd-h h1{font-size:17px;font-weight:700}
.sd-h h1 span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sd-h .status{font-size:11px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:6px}
.sd-h .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.url-bar{display:flex;gap:6px;padding:10px 20px;border-bottom:1px solid var(--border)}
.url-bar input{flex:1;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;outline:none}
.url-bar input:focus{border-color:var(--blue)}
.url-bar button{padding:8px 12px;background:var(--blue);border:none;border-radius:6px;color:#fff;font-size:11px;cursor:pointer;font-weight:600;white-space:nowrap}
.url-bar button:hover{opacity:.9}
.search-box{padding:10px 20px;border-bottom:1px solid var(--border)}
.search-box input{width:100%;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;outline:none}
.auto-row{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--border)}
.auto-row span{font-size:11px;color:var(--muted);flex:1}
.switch{position:relative;width:40px;height:22px;background:var(--border);border-radius:11px;cursor:pointer}
.switch.on{background:var(--green)}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.2s}
.switch.on::after{transform:translateX(18px)}
.ch-list{flex:1;overflow-y:auto;padding:8px}
.ch-list::-webkit-scrollbar{width:3px}
.ch-list::-webkit-scrollbar-thumb{background:var(--border)}
.item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:.15s;border:1px solid transparent;margin-bottom:2px}
.item:hover{background:rgba(96,165,250,.06)}
.item.active{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3)}
.item .num{font-size:10px;color:var(--muted);min-width:22px;text-align:right;font-weight:600}
.item .name{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .group{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(167,139,250,.15);color:var(--purple)}
.item .live{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column}
.player{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative}
.player video{width:100%;height:100%;object-fit:contain;display:none}
.player .ph{text-align:center;color:var(--muted)}
.player .ph .big{font-size:60px;margin-bottom:12px}
.player .ph .msg{font-size:14px}
.player .ph .hint{font-size:11px;margin-top:20px;color:rgba(255,255,255,.15)}
.player .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none}
.player .loading .spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.bar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--card);border-top:1px solid var(--border);display:none}
.bar .now{font-size:13px;flex:1}
.bar .badge{font-size:10px;padding:2px 8px;border-radius:6px}
.bad-live{background:rgba(248,113,113,.15);color:var(--red);animation:pulse 2s infinite}
.bad-auto{background:rgba(74,222,128,.15);color:var(--green)}
.btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.btn:hover{background:rgba(96,165,250,.1);border-color:var(--blue)}
.btn.on{background:var(--green);border-color:var(--green);color:#000}
.toast{position:fixed;bottom:80px;right:20px;padding:10px 18px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:12px;z-index:99;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.source-hint{padding:6px 20px;font-size:10px;color:var(--muted);background:rgba(96,165,250,.03);border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sd-h">
    <h1>📡 <span>全球电视直播</span></h1>
    <div class="status"><span class="dot"></span><span id="chCount">等待加载数据源...</span></div>
  </div>
  <div class="source-hint" id="sourceHint"></div>
  <div class="url-bar">
    <input type="text" id="urlInput" placeholder="粘贴 M3U 播放列表地址..." value="https://live.fanmingming.com/tv/m3u/global.m3u">
    <button onclick="loadPlaylist()">加载</button>
  </div>
  <div class="search-box"><input type="text" id="searchInput" placeholder="搜索频道..." oninput="renderList()"></div>
  <div class="auto-row">
    <span>🔄 自动轮播 (20s)</span>
    <div class="switch" id="autoSwitch" onclick="toggleAuto()"></div>
  </div>
  <div class="ch-list" id="chList"><div style="text-align:center;padding:40px;color:var(--muted)">点击上方「加载」按钮<br>或输入 M3U 地址</div></div>
</div>
<div class="main">
  <div class="player" id="playerArea">
    <div class="ph" id="placeholder"><div class="big">📡</div><div class="msg">加载播放列表后选择频道</div><div class="hint">你的浏览器将直连视频源，无需经过服务器</div></div>
    <div class="loading" id="loading"><div class="spin"></div><div style="font-size:12px;color:var(--muted)">连接视频流...</div></div>
    <video id="video" controls></video>
  </div>
  <div class="bar" id="bar">
    <span class="badge bad-live">● LIVE</span>
    <span class="now" id="nowPlaying">未选择</span>
    <span class="badge bad-auto" id="autoBadge" style="display:none">🔄 自动</span>
    <button class="btn" onclick="prevCh()">◀</button>
    <button class="btn" onclick="nextCh()">▶</button>
    <button class="btn" id="autoBtn" onclick="toggleAuto()">🔁</button>
    <button class="btn" id="muteBtn" onclick="toggleMute()">🔊</button>
    <button class="btn" onclick="toggleFS()">⛶</button>
  </div>
</div>
<script>
var channels=[],cur=-1,hls=null,auto=false,timer=null;
var v=document.getElementById('video'),ph=document.getElementById('placeholder'),ld=document.getElementById('loading');

function toast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2500)}

function setLoading(s){ld.style.display=s?'flex':'none';ph.style.display=s?'none':'flex'}

async function loadPlaylist(){
  var url=document.getElementById('urlInput').value.trim();
  if(!url)return toast('请输入 M3U 地址');
  document.getElementById('chList').innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">⏳ 获取播放列表...</div>';
  document.getElementById('sourceHint').textContent='数据源: '+url;
  try{
    var r=await fetch(url,{cache:'no-cache'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    var t=await r.text();
    parseM3U(t);
    document.getElementById('chCount').textContent='已加载 '+channels.length+' 个频道 ✅';
    toast('加载完成: '+channels.length+' 个频道');
  }catch(e){
    document.getElementById('chList').innerHTML='<div style="text-align:center;padding:30px;color:var(--red)">❌ 加载失败<br><span style="font-size:11px">'+e.message+'</span><br><br><span style="font-size:11px;color:var(--muted)">尝试粘贴其他 M3U 地址</span></div>';
    document.getElementById('chCount').textContent='加载失败 ❌';
    toast('加载失败: '+e.message);
  }
}

function parseM3U(t){
  channels=[];
  var lines=t.split('\n'),name='',group='';
  for(var i=0;i<lines.length;i++){
    var l=lines[i].trim();
    if(l.startsWith('#EXTINF')){
      var m=l.match(/tvg-name="([^"]*)"/);if(m)name=m[1];
      else{m=l.match(/,(.+)/);if(m)name=m[1].trim();else name=l}
      m=l.match(/group-title="([^"]*)"/);if(m)group=m[1];
    }else if(l&&!l.startsWith('#')){
      if(name)channels.push({name:name,url:l,group:group||'其他'});
      name='';group='';
    }
  }
  if(channels.length===0){
    for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(l&&!l.startsWith('#')&&(l.includes('http://')||l.includes('https://'))){channels.push({name:'频道'+(channels.length+1),url:l,group:'导入'});name=''}}
  }
  renderList();
}

function getFiltered(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase();
  if(!q)return channels;
  return channels.filter(function(c){return c.name.toLowerCase().indexOf(q)!==-1||c.group.toLowerCase().indexOf(q)!==-1})
}

function renderList(){
  var list=getFiltered();var h='';
  if(channels.length===0){h='<div style="text-align:center;padding:30px;color:var(--muted)">没有频道，请先加载播放列表</div>'}
  else if(list.length===0){h='<div style="text-align:center;padding:30px;color:var(--muted)">没有匹配的频道</div>'}
  else{list.forEach(function(c,i){var idx=channels.indexOf(c);h+='<div class="item'+(idx===cur?' active':'')+'" onclick="play('+idx+')"><span class="num">'+(idx+1)+'</span><span class="name">'+c.name+'</span><span class="group">'+c.group.substring(0,8)+'</span>'+(idx===cur?'<span class="live"></span>':'')+'</div>'})}
  document.getElementById('chList').innerHTML=h;
}

function play(i){
  if(i<0||i>=channels.length)return;
  cur=i;stopAuto();destroyHls();
  var ch=channels[i];
  ph.style.display='none';v.style.display='block';setLoading(true);
  document.getElementById('bar').style.display='flex';
  document.getElementById('nowPlaying').textContent=ch.name;
  if(Hls.isSupported()){
    hls=new Hls({maxBufferLength:60,lowLatencyMode:true});
    hls.loadSource(ch.url);hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED,function(){setLoading(false);v.play().catch(function(){})});
    hls.on(Hls.Events.ERROR,function(ev,data){
      if(data.fatal){destroyHls();setLoading(false);ph.style.display='block';v.style.display='none';ph.innerHTML='<div class="big">❌</div><div class="msg">播放失败: '+ch.name+'</div><div class="hint">该源可能已失效，试试其他频道</div>'}}
    });
  }else if(v.canPlayType('application/vnd.apple.mpegurl')){
    v.src=ch.url;v.play().catch(function(){});setLoading(false);
  }else{setLoading(false);toast('浏览器不支持 HLS 播放')}
  renderList();
}

function destroyHls(){if(hls){hls.destroy();hls=null}}
function prevCh(){var list=getFiltered();if(list.length===0)return;var ci=list.indexOf(channels[cur]);play(channels.indexOf(ci>0?list[ci-1]:list[list.length-1]))}
function nextCh(){var list=getFiltered();if(list.length===0)return;var ci=list.indexOf(channels[cur]);play(channels.indexOf(ci<list.length-1?list[ci+1]:list[0]))}
function toggleAuto(){
  auto=!auto;var s=document.getElementById('autoSwitch'),b=document.getElementById('autoBadge'),ab=document.getElementById('autoBtn');
  if(auto){s.className='switch on';b.style.display='inline';ab.className='btn on';if(cur===-1&&channels.length>0)play(0);autoNext()}
  else{s.className='switch';b.style.display='none';ab.className='btn';stopAuto()}
}
function autoNext(){stopAuto();timer=setTimeout(function(){nextCh();if(auto)autoNext()},20000)}
function stopAuto(){if(timer){clearTimeout(timer);timer=null}}
function toggleMute(){v.muted=!v.muted;document.getElementById('muteBtn').textContent=v.muted?'🔇':'🔊'}
function toggleFS(){if(document.fullscreenElement)document.exitFullscreen();else document.getElementById('playerArea').requestFullscreen()}
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowUp'){e.preventDefault();prevCh()}if(e.key==='ArrowDown'){e.preventDefault();nextCh()}
  if(e.key===' '){e.preventDefault();toggleAuto()}if(e.key==='m')toggleMute();if(e.key==='f')toggleFS()
});
setTimeout(function(){loadPlaylist()},500);
</script>
</body></html>
